final mavenPath = "${group.toString().replace('.', '/')}/${project.name}/${version}".toString()

def asArtifactString = {
    def value = gradleutils.unpack(it)
    if (!(value instanceof Dependency))
        throw new IllegalArgumentException("Cannot get non-dependency as artifact string! Found: $value.class")

    def classifier = value.hasProperty('classifier') ? ":$value.classifier" : ''
    def extension = value.hasProperty('artifactType') ? "@$value.artifactType" : value.hasProperty('extension') ? "@$value.extension" : ''
    classifier = classifier != ':null' ? classifier : ''
    extension = extension != '@null' ? extension : ''

    "$value.group:$value.name:$value.version$classifier$extension".toString()
}

patcher {
    excs.from file("$rootDir/src/main/resources/forge.exc")
    //parent = project(':mcp')
    mcVersion = minecraftVersion
    mappingChannel = mappingsChannel
    mappingVersion = mappingsVersion
    patches = rootProject.file('patches/minecraft')
    patchedSrc = rootProject.file('src/minecraft/java')
    srgPatches = false
    accessTransformers.from rootProject.file('src/main/resources/META-INF/accesstransformer.cfg')
    sideAnnotationStrippers.from rootProject.file('src/main/resources/forge.sas')

    runs {
        configureEach {
            workingDir = layout.projectDirectory.dir("runs/$name")

            mainClass = 'net.minecraftforge.bootstrap.ForgeBootstrap'
            args '--gameDir', '.'
            jvmArgs '-Djava.net.preferIPv6Addresses=system'

            systemProperty 'bsl.debug', 'true'
            systemProperty 'terminal.jline', 'true'
            with(sourceSets.test) {
                systemProperty 'forge.enableGameTest', 'true'
                systemProperty 'forgedev.enableTestMods', 'true'
            }
        }

        register('client') {
            systemProperty 'eventbus.checkTypesOnDispatch', 'true'
            systemProperty 'org.lwjgl.system.SharedLibraryExtractDirectory', 'lwjgl_dll'

            args '--launchTarget', 'forge_dev_client',
                '--username', 'Dev',
                '--version', project.name,
                '--accessToken', '0',
                '--userType', 'mojang',
                '--versionType', 'release',
                '--assetsDir', '{assets_root}',
                '--assetIndex', '{asset_index}'
        }

        register('server') {
            args '--launchTarget', 'forge_dev_server'
        }

        register('gameTestServer') {
            args '--launchTarget', 'forge_dev_server_gametest'
            args '--uniqueWorld' // Unique world is used so that the world regenerates, as well as the world config isn't influenced by other runs
        }

        register('data') {
            args '--launchTarget', 'forge_dev_data',
                '--all',
                '--validate',
                '--existing', sourceSets.main.resources.srcDirs[0],
                '--assetsDir', '{assets_root}',
                '--assetIndex', '{asset_index}'

            with(sourceSets.main) {
                args '--mod', 'forge',
                    '--output', rootProject.file('src/main/generated/')
            }

            with(sourceSets.test) {
                args '--mod', '.+',
                    '--existing', sourceSets.test.resources.srcDirs[0],
                    '--output', rootProject.file('src/test/generated/')
            }
        }

        register('clientData') {
            args '--all',
                '--validate',
                '--existing', sourceSets.main.resources.srcDirs[0],
                '--assetsDir', '{assets_root}',
                '--assetIndex', '{asset_index}'

            with(sourceSets.main) {
                args '--launchTarget', 'forge_dev_client_data',
                    '--mod', 'forge',
                    '--output', rootProject.file('src/main/generated/'),
                    '--mod', 'forge'
            }

            with(sourceSets.test) {
                args '--launchTarget', 'forge_dev',
                    '--launchEntry', 'minecraft/net.minecraft.client.data.Main',
                    '--launchData',
                    '--mod', '.+',
                    '--existing', sourceSets.test.resources.srcDirs[0],
                    '--output', rootProject.file('src/test/generated/')
            }
        }
    }
}

tasks.named('applyPatches', ApplyPatches) {
