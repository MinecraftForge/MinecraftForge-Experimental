tasks.register('installerJson', InstallerJson) {
    icon = rootProject.file('icon.ico')

    // Json to install into the client's launcher
    dependsOn(launcherJson)
    input.from(launcherJson.output)

    dependsOn(setupMCP)
    input.from(
        downloadClientMappings.output, setupMCP.clientRaw, createClientOfficial, applyClientBinPatches,
        downloadServerMappings.output, setupMCP.serverExtracted, createServerOfficial, applyServerBinPatches
    )

    var installertools = asArtifactString(buildLibs.installertools)
    var fart = asArtifactString(buildLibs.fart)
    var binarypatcher = asArtifactString(buildLibs.binarypatcher)

    doFirst {
        var libs = libraries

        var installerToolsClasspath = getClasspath(project, libs, installertools)
        var fartClasspath = getClasspath(project, libs, fart)
        var binarypatcherClasspath = getClasspath(project, libs, binarypatcher)

        getClasspath(project, libs, mcpArtifactString) //Tell it to download mcp_config

        json.putAll([
            _comment: launcherJson.json._comment,
            hideExtract: true,
            spec: 1,
            profile: project.name,
            version: launcherJson.json.id,
            path: Util.getMavenInfoFromTask(tasks.serverShimJar).name,
            minecraft: minecraftVersion,
            serverJarPath: '{LIBRARY_DIR}/net/minecraft/server/{MINECRAFT_VERSION}/server-{MINECRAFT_VERSION}-bundled.jar',
            data: [
                MOJMAPS: [
                    client: "[net.minecraft:client:${minecraftVersion}:mappings@tsrg]",
                    server: "[net.minecraft:server:${minecraftVersion}:mappings@tsrg]"
                ],
                MOJMAPS_SHA: [
                    client: "'${downloadClientMappings.output.asFile.get().sha1}'",
                    server: "'${downloadServerMappings.output.asFile.get().sha1}'"
                ],
                MC_UNPACKED: [
                    client: "[net.minecraft:client:${minecraftVersion}]",
                    server: "[net.minecraft:server:${minecraftVersion}:unpacked]"
                ],
                MC_UNPACKED_SHA: [
                    client: "'${setupMCP.clientRaw.asFile.get().sha1}'",
                    server: "'${setupMCP.serverExtracted.asFile.get().sha1}'"
                ],
                MC_OFF: [
                    client: "[net.minecraft:client:${minecraftVersion}:official]",
                    server: "[net.minecraft:server:${minecraftVersion}:official]"
                ],
                MC_OFF_SHA: [
                    client: "'${createClientOfficial.output.get().asFile.sha1}'",
                    server: "'${createServerOfficial.output.get().asFile.sha1}'"
                ],
                BINPATCH: [
                    client: '/data/client.lzma',
                    server: '/data/server.lzma'
                ],
                PATCHED: [
                    client: "[${project.group}:${project.name}:${project.version}:client]",
                    server: "[${project.group}:${project.name}:${project.version}:server]"
                ],
                PATCHED_SHA: [
                    client: "'${applyClientBinPatches.output.get().asFile.sha1}'",
                    server: "'${applyServerBinPatches.output.get().asFile.sha1}'"
                ]
            ],
            processors: [
                [
                    sides: ['server'],
                    jar: installertools,
                    classpath: installerToolsClasspath,
                    args: [
                        '--task', 'EXTRACT_FILES',
                        '--archive', '{INSTALLER}',

                        '--from', 'data/README.txt',
                        '--to', '{ROOT}/README.txt',

                        '--from', 'data/run.sh',
                        '--to', '{ROOT}/run.sh',
                        '--exec', '{ROOT}/run.sh',

                        '--from', 'data/run.bat',
                        '--to', '{ROOT}/run.bat',

                        '--from', 'data/user_jvm_args.txt',
                        '--to', '{ROOT}/user_jvm_args.txt',
                        '--optional', '{ROOT}/user_jvm_args.txt',

                        '--from', 'data/unix_args.txt',
                        '--to', "{ROOT}/libraries/${mavenPath}/unix_args.txt",

                        '--from', 'data/win_args.txt',
                        '--to', "{ROOT}/libraries/${mavenPath}/win_args.txt"
                    ]
                ], [
                    sides: ['server'],
                    jar: installertools,
                    classpath: installerToolsClasspath,
                    args: [
                        '--task', 'BUNDLER_EXTRACT',
                        '--input', '{MINECRAFT_JAR}',
                        '--output', '{ROOT}/libraries/',
                        '--libraries'
                    ]
                ], [
                    sides: ['server'],
                    jar: installertools,
                    classpath: installerToolsClasspath,
                    args: [
                        '--task', 'BUNDLER_EXTRACT',
                        '--input', '{MINECRAFT_JAR}',
                        '--output', '{MC_UNPACKED}',
                        '--jar-only'
                    ],
                    outputs: [
                        '{MC_UNPACKED}': '{MC_UNPACKED_SHA}'
                    ]
                ], [
                    jar: installertools,
                    classpath: installerToolsClasspath,
                    args: [
                        '--task', 'DOWNLOAD_MOJMAPS',
                        '--sanitize',
                        '--version', minecraftVersion,
                        '--side', '{SIDE}',
                        '--output', '{MOJMAPS}'
                    ],
                    outputs: [
                        '{MOJMAPS}': '{MOJMAPS_SHA}'
                    ]
                ], [
                    sides: ['server'],
                    jar: fart,
                    classpath: fartClasspath,
                    args: [
                        '--input', '{MC_UNPACKED}',
                        '--output', '{MC_OFF}',
                        '--names', '{MOJMAPS}',
                        '--ann-fix', '--ids-fix', '--src-fix', '--record-fix', '--strip-sigs', '--reverse'
                    ],
                    outputs: [
                        '{MC_OFF}': '{MC_OFF_SHA}'
                    ]
                ], [
                    sides: ['client'],
                    jar: fart,
                    classpath: fartClasspath,
                    args: [
                        '--input', '{MINECRAFT_JAR}',
                        '--output', '{MC_OFF}',
                        '--names', '{MOJMAPS}',
                        '--ann-fix', '--ids-fix', '--src-fix', '--record-fix', '--strip-sigs', '--reverse'
                    ],
                    outputs: [
                        '{MC_OFF}': '{MC_OFF_SHA}'
                    ]
                ], [
                    jar: binarypatcher,
                    classpath: binarypatcherClasspath,
                    args: [
                        '--clean', '{MC_OFF}',
                        '--output', '{PATCHED}',
                        '--apply', '{BINPATCH}',
                        '--data', '--unpatched'
                    ],
                    outputs: [
                        '{PATCHED}': '{PATCHED_SHA}'
                    ]
                ]
            ]
        ] as LinkedHashMap)
    }
}

tasks.named('universalJar', Jar) {
    from(EXTRA_TXTS)
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    exclude '.cache'

    dependsOn downloadCrowdin
    var crowdin = downloadCrowdin.dest
    from(provider { zipTree(crowdin) }) {
        include 'assets/forge/lang/*.json'
    }

    manifest {
        attributes([
            'Automatic-Module-Name': 'net.minecraftforge.forge'
        ])
        attributes([
            'Specification-Title'   : gradleutils.displayName.get(),
            'Specification-Vendor'  : gradleutils.vendor.get(),
            'Specification-Version' : gitversion.info.tag,
            'Implementation-Title'  : project.group,
            'Implementation-Vendor' : gradleutils.vendor.get(),
            'Implementation-Version': forgeVersion
        ], 'net/minecraftforge/versions/forge/')
        attributes([
            'Specification-Title'   : 'Minecraft',
            'Specification-Vendor'  : gradleutils.vendor.get(),
            'Specification-Version' : minecraftVersion,
            'Implementation-Title'  : 'MCP',
            'Implementation-Vendor' : gradleutils.vendor.get(),
            'Implementation-Version': mcpVersion
        ], 'net/minecraftforge/versions/mcp/')
    }
    jarSigner.sign(it)
}

tasks.named('universalJarSrg', Jar) {
    jarSigner.sign(it)
}

// TODO [ForgeDev] Rework to be friendly with Gradle 10 + configuration cache
tasks.register('installerJar', InstallerJar) {
    //fat = true // default = !System.getEnv('CI')
    //offline = true // default = false
    from(EXTRA_TXTS)
    from(rootProject.file('/forge_installer_logo.png')) {
        rename { 'big_logo.png' }
    }
    from(genClientBinPatches.output) {
        rename { 'data/client.lzma' }
    }
    from(genServerBinPatches.output) {
        rename { 'data/server.lzma' }
    }

    final var argsFile = rootProject.file('server_files/args.txt')
    final Map<String, Map<String, String>> tokens = [tokens: [
        SHIM_JAR_FILE: serverShimJar.archiveFileName.get(),
        MAVEN_PATH: mavenPath
    ]]
    from(argsFile) {
        filter(tokens, ReplaceTokens)
        into 'data'
        rename { 'unix_args.txt' }
    }
    from(argsFile) {
        filter(tokens, ReplaceTokens)
        into 'data'
        rename { 'win_args.txt' }
    }

    from(rootProject.file('server_files')) {
        filter(tokens, ReplaceTokens)
        into 'data'
        exclude 'args.txt'
    }

    jarSigner.sign(it)
}

tasks.register('mdkZip', Zip) {
    archiveBaseName = project.name
    archiveClassifier = 'mdk'
    archiveVersion = project.version
    destinationDirectory = file('build/libs')

    from rootProject.file('gradlew')
    from rootProject.file('gradlew.bat')
    from(EXTRA_TXTS)
    from(rootProject.file('gradle/')){
        into('gradle/')
    }
    from(rootProject.file('mdk/')){
        rootProject.file('mdk/gitignore.txt').eachLine{
            if (!it.trim().isEmpty() && !it.trim().startsWith('#'))
                exclude it
        }
        filter(ReplaceTokens, tokens: [
            FORGE_VERSION: forgeVersion,
            FORGE_GROUP: project.group,
            FORGE_NAME: project.name,
            MC_VERSION: minecraftVersion,
            MAPPING_CHANNEL: mappingsChannel,
            MAPPING_VERSION: mappingsVersion,
            FORGE_SPEC_VERSION: gitversion.info.tag.split("\\.")[0],
            MC_NEXT_VERSION: minecraftNextVersion
        ])
        rename 'gitignore\\.txt', '.gitignore'
        rename 'gitattributes\\.txt', '.gitattributes'
    }
    from(rootProject.file('src/test/java/com/example/examplemod/')) {
        into('src/main/java/com/example/examplemod/')
    }
    from(rootProject.file('src/test/generated/mdk_datagen/')) {
        into('src/main/resources/')
        exclude '**/.cache/'
    }
}

tasks.register('genAllData') {
