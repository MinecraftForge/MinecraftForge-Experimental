}

afterEvaluate {
    if (!patcher.srgPatches) {
        /*
        srg2mcpClean {
            dependsOn = []
            input = project(':mcp').setupMCP.output
        }
         */
        tasks.named('userdevJar') { onlyIf = { true } }
        def patches = layout.buildDirectory.dir('genPatchesForUserdev/output/').map { it.asFile.mkdirs(); it }
        def genPatchesForUserdev = tasks.register('genPatchesForUserdev', GeneratePatches) {
            input = setupMCPSrg.output
            modified = applyRangeMapBase.output
            basePathPrefix = genPatches.basePathPrefix
            modifiedPathPrefix = genPatches.modifiedPathPrefix
            output = patches
            autoHeader = true
            lineEndings = '\n'
        }
        bakePatches {
            dependsOn = []
            input = genPatchesForUserdev.get().output
        }
    }
}

tasks.named('userdevConfig', net.minecraftforge.forgedev.tasks.generation.GeneratePatcherConfigV2) {
    binpatcherVersion = asArtifactString(dependencies.variantOf(buildLibs.binarypatcher) { classifier 'fatjar' })

    configurations.installer.allDependencies.forEach {
        if (it instanceof ProjectDependency)
            libraries.add("$it.group:$it.name:$it.version")
        else
            libraries.add(it.toString())
    }

    inject = '' // We don't have a userdev sourceset anymore. Empty as a gradle workaround...

    // TODO [ForgeDev] Support for parent configs? At the time of conversion to ForgeDev 7, they were never used.
    // TODO [ForgeDev] Consolidate Patcher + UserDev Config runs in a sane way
    runs {
        configureEach {
            parents = []
            main = 'net.minecraftforge.bootstrap.ForgeBootstrap'
            args '--gameDir', '.'
            jvmArgs '-Djava.net.preferIPv6Addresses=system'
            client = it.name.containsIgnoreCase('client')
            environment 'MCP_MAPPINGS', '{mcp_mappings}'
        }

        client {
            property 'forge.enableGameTest', 'true'
            args '--launchTarget', "forge_userdev_client"
            args '--version', 'MOD_DEV'
            args '--assetIndex', '{asset_index}'
            args '--assetsDir', '{assets_root}'
        }

        clientData {
            args '--launchTarget', "forge_userdev_client_data"
            args '--assetIndex', '{asset_index}'
            args '--assetsDir', '{assets_root}'
        }

        server {
            property 'forge.enableGameTest', 'true'
            args '--launchTarget', "forge_userdev_server"
        }

        gameTestServer {
            args '--launchTarget', "forge_userdev_server_gametest"
        }

        data {
            args '--launchTarget', "forge_userdev_data"
            args '--assetIndex', '{asset_index}'
            args '--assetsDir', '{assets_root}'
        }
    }
}

tasks.register('findFinalizeSpawnTargets', BytecodePredicateFinder) {
    jar = createClientOfficial.output
    output = rootProject.file('src/main/resources/coremods/finalize_spawn_targets.json')
    predicate = { ClassNode parent, MethodNode node, AbstractInsnNode insn ->
            return 'net/minecraft/world/level/BaseSpawner' != parent.name // Ignore this class as we special case it.
            && insn.opcode === Opcodes.INVOKEVIRTUAL
            && (insn as MethodInsnNode).name == 'finalizeSpawn'
            && (insn as MethodInsnNode).desc == '(Lnet/minecraft/world/level/ServerLevelAccessor;Lnet/minecraft/world/DifficultyInstance;Lnet/minecraft/world/entity/EntitySpawnReason;Lnet/minecraft/world/entity/SpawnGroupData;)Lnet/minecraft/world/entity/SpawnGroupData;';
    }
}

